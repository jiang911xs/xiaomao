<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1a120d">
<title>小猫的房间</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=ZCOOL+XiaoWei&family=Noto+Serif+SC:wght@200;300;400&display=swap');

:root { --gold:#e8c87a; --gold-dim:#9a8058; --text:#d8ccc0; --text-dim:#8a7870;
  --tab-h:64px; --safe:env(safe-area-inset-bottom,0px); }
* { margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent; }
html,body { width:100%;height:100%;background:#1a120d;color:var(--text);
  font-family:'Noto Serif SC',serif;overflow:hidden;overscroll-behavior:none;user-select:none; }

/* 固定背景 */
.bg-layer { position:fixed;inset:0;z-index:0;pointer-events:none; }
.bg-wall { position:absolute;top:0;left:0;right:0;height:65%;
  background:linear-gradient(180deg,#1f1812 0%,#241b14 40%,#2a1f16 100%); }
.bg-floor { position:absolute;bottom:0;left:0;right:0;height:35%;
  background:linear-gradient(180deg,#2a1f16 0%,#1f1710 60%,#18120c 100%);
  border-top:2px solid rgba(50,35,22,0.5); }
.bg-window { position:absolute;top:5%;left:50%;transform:translateX(-50%);
  width:min(44vw,160px);height:min(30vw,108px);
  background:linear-gradient(180deg,#3a2a18 0%,#2a1c10 100%);
  border-radius:12px;border:3px solid #3a2818;
  box-shadow:0 0 0 2px rgba(30,18,8,0.6),inset 0 0 0 1px rgba(60,40,20,0.4);overflow:hidden; }
.bg-glass { position:absolute;inset:4px;border-radius:9px;overflow:hidden;
  background:linear-gradient(180deg,#7eb8da 0%,#b8d8f0 40%,#d4e8f8 100%);transition:background 2s ease; }
.bg-sun { position:absolute;width:26px;height:26px;
  background:radial-gradient(circle,#fff8c0 0%,#ffe8a0 30%,#ffd080 60%,rgba(255,200,100,0) 100%);
  border-radius:50%;top:8px;right:12px;
  box-shadow:0 0 20px 6px rgba(255,220,140,0.5),0 0 36px 10px rgba(255,200,100,0.2);
  transition:opacity 2s ease,transform 2s ease; }
.bg-cloud { position:absolute;background:rgba(255,255,255,0.7);border-radius:50%;transition:opacity 2s ease; }
.bg-cloud.c1{width:28px;height:10px;top:14px;left:12px}.bg-cloud.c2{width:20px;height:7px;top:26px;left:28px}.bg-cloud.c3{width:16px;height:6px;top:34px;left:14px}
.bg-moon { position:absolute;width:20px;height:20px;
  background:radial-gradient(circle at 40% 40%,#f8f0e0 0%,#e8dcc8 60%,#d0c8b8 100%);
  border-radius:50%;top:10px;right:14px;
  box-shadow:0 0 14px 4px rgba(240,230,210,0.3),0 0 28px 8px rgba(220,200,180,0.1);
  opacity:0;transition:opacity 2s ease; }
.bg-wstar { position:absolute;width:2px;height:2px;background:#fff;border-radius:50%;opacity:0;transition:opacity 2s ease; }
body.soothe .bg-wstar{opacity:0.7;animation:wTwinkle 3s ease-in-out infinite}
.bg-wstar:nth-child(6){top:14%;left:16%}.bg-wstar:nth-child(7){top:26%;left:38%}
.bg-wstar:nth-child(8){top:18%;left:52%}.bg-wstar:nth-child(9){top:38%;left:23%}
.bg-wstar:nth-child(10){top:32%;left:48%;animation-delay:0.5s}.bg-wstar:nth-child(11){top:48%;left:58%;animation-delay:1s}
@keyframes wTwinkle{0%,100%{opacity:0.2}50%{opacity:0.8}}
body.soothe .bg-glass{background:linear-gradient(180deg,#0a1228 0%,#101e38 50%,#162840 100%)}
body.soothe .bg-sun{opacity:0;transform:translateY(30px)}
body.soothe .bg-cloud{opacity:0}
body.soothe .bg-moon{opacity:1}

/* 主结构 */
.app { position:fixed;inset:0;display:flex;flex-direction:column;z-index:10; }
.pages { flex:1;position:relative;overflow:hidden; }
.page { position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
  opacity:0;transform:translateY(12px);transition:opacity 0.5s ease,transform 0.5s ease;
  pointer-events:none;padding-bottom:calc(var(--tab-h) + var(--safe) + 10px); }
.page.active { opacity:1;transform:translateY(0);pointer-events:all; }
.tabbar { position:relative;z-index:20;height:calc(var(--tab-h) + var(--safe));padding-bottom:var(--safe);
  display:flex;background:rgba(20,14,8,0.88);backdrop-filter:blur(20px);border-top:1px solid rgba(100,70,40,0.1); }
.tab { flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;transition:all 0.3s ease;padding-top:6px; }
.tab-icon { font-size:1.35rem;line-height:1;transition:transform 0.3s ease,filter 0.3s ease;filter:grayscale(0.5) brightness(0.55); }
.tab-label { font-size:0.58rem;letter-spacing:0.1em;color:var(--text-dim);transition:color 0.3s ease;font-weight:300; }
.tab.active .tab-icon { filter:grayscale(0) brightness(1.1) drop-shadow(0 0 6px rgba(220,180,100,0.5));transform:translateY(-2px) scale(1.1); }
.tab.active .tab-label { color:var(--gold); }

/* 猫咪页 */
.cat-scene { position:relative;width:min(72vw,260px);height:min(50vw,190px);cursor:pointer;margin-bottom:6px; }

/* SVG猫整体动画 */
.cat-svg { width:100%;height:100%; }
.cat-svg .cat-anim {
  animation:catBreathe 6s ease-in-out infinite, catFloat 8s ease-in-out infinite;
  transform-origin:140px 130px; }
@keyframes catBreathe{0%,100%{transform:scale(1)}50%{transform:scale(1.012)}}
@keyframes catFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-2px)}}
body.soothe .cat-svg .cat-anim {
  animation:catBreatheSlow 10s ease-in-out infinite, catFloatSlow 14s ease-in-out infinite; }
@keyframes catBreatheSlow{0%,100%{transform:scale(1)}50%{transform:scale(1.007)}}
@keyframes catFloatSlow{0%,100%{transform:translateY(0)}50%{transform:translateY(-1px)}}

/* 眼睛状态 */
.cat-svg .eyes-open { opacity:1;transition:opacity 0.5s ease; }
.cat-svg .eyes-closed { opacity:0;transition:opacity 0.5s ease; }
body.soothe .cat-svg .eyes-open { opacity:0; }
body.soothe .cat-svg .eyes-closed { opacity:1; }

/* 被子 */
.blanket { position:absolute;bottom:14%;left:50%;transform:translateX(-50%);
  width:58%;height:26%;border-radius:44% 44% 30% 30%;
  background:linear-gradient(180deg,rgba(60,36,50,0.9) 0%,rgba(42,22,34,0.94) 100%);
  opacity:0;transition:opacity 2s ease;z-index:3;pointer-events:none;
  border:1px solid rgba(160,120,140,0.05); }
body.soothe .blanket{opacity:0.82}

/* 消息 */
.msg-area { min-height:40px;display:flex;align-items:center;justify-content:center;width:100%;padding:0 24px; }
.msg-bubble { font-family:'Ma Shan Zheng',cursive;font-size:1rem;color:var(--text);letter-spacing:0.1em;line-height:1.8;
  text-align:center;padding:10px 20px;border-radius:18px;
  background:rgba(30,20,14,0.8);border:1px solid rgba(180,150,120,0.1);
  backdrop-filter:blur(8px);max-width:300px;
  opacity:0;transform:translateY(6px);transition:opacity 0.6s ease,transform 0.6s ease; }
.msg-bubble.show{opacity:1;transform:translateY(0)}
.sound-row { display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-top:10px; }
.sound-btn { background:rgba(40,28,18,0.7);border:1px solid rgba(160,130,100,0.12);border-radius:16px;
  padding:6px 12px;color:var(--text-dim);font-size:0.7rem;
  font-family:'Noto Serif SC',serif;letter-spacing:0.08em;cursor:pointer;
  transition:all 0.3s ease;display:flex;align-items:center;gap:3px;backdrop-filter:blur(6px); }
.sound-btn.active{background:rgba(160,120,60,0.15);border-color:rgba(200,150,80,0.3);color:var(--gold)}
.sound-btn span{font-size:0.8rem}
.purr { position:fixed;font-family:'Ma Shan Zheng',cursive;font-size:0.85rem;color:rgba(200,180,160,0.5);
  pointer-events:none;animation:floatUp 2.4s ease-out forwards;z-index:100; }
@keyframes floatUp{0%{opacity:0;transform:translateY(0) scale(0.8)}20%{opacity:0.6}100%{opacity:0;transform:translateY(-48px) scale(1.05)}}
.heart-puff { position:fixed;pointer-events:none;z-index:100;font-size:17px;animation:heartFloat 1.3s ease-out forwards; }
@keyframes heartFloat{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-65px) scale(0.3)}}

/* 安抚 */
#soothe-veil{position:fixed;inset:0;background:rgba(6,3,1,0);pointer-events:none;transition:background 2.2s ease;z-index:50}
body.soothe #soothe-veil{background:rgba(6,3,1,0.45)}
#soothe-stars{position:fixed;inset:0;z-index:51;pointer-events:none;opacity:0;transition:opacity 2.2s ease}
#soothe-stars.active{opacity:1}
.soothe-star{position:absolute;border-radius:50%;background:#fff;animation:starTwinkle var(--sdur) ease-in-out infinite;animation-delay:var(--sdelay);box-shadow:0 0 4px 1px rgba(255,245,220,0.4)}
@keyframes starTwinkle{0%,100%{opacity:0.1;transform:scale(1)}50%{opacity:1;transform:scale(2)}}
#soothe-tip{position:fixed;top:max(16px,env(safe-area-inset-top,16px));left:50%;transform:translateX(-50%);font-family:'Ma Shan Zheng',cursive;font-size:0.75rem;color:rgba(200,150,70,0.7);letter-spacing:0.2em;opacity:0;pointer-events:none;transition:opacity 1.2s ease;z-index:60}
body.soothe #soothe-tip{opacity:1}

/* 呼吸页 */
.breath-page{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:44px;padding:0 24px;min-height:100%}
.breath-orb-wrap{position:relative;width:190px;height:190px;display:flex;align-items:center;justify-content:center}
.orb-ring{position:absolute;border-radius:50%;border:1px solid rgba(200,180,150,0.06)}
.orb-ring:nth-child(1){width:190px;height:190px;animation:orbPulse 4s ease-in-out infinite}
.orb-ring:nth-child(2){width:150px;height:150px;animation:orbPulse 4s ease-in-out infinite 0.3s}
.orb-ring:nth-child(3){width:110px;height:110px;animation:orbPulse 4s ease-in-out infinite 0.6s}
@keyframes orbPulse{0%,100%{opacity:0.25;transform:scale(1)}50%{opacity:0.06;transform:scale(1.05)}}
.breath-orb{width:85px;height:85px;border-radius:50%;background:radial-gradient(circle at 38% 35%,rgba(220,200,180,0.9) 0%,rgba(180,140,100,0.7) 40%,rgba(140,100,60,0.5) 100%);box-shadow:0 0 28px rgba(200,140,80,0.35),0 0 56px rgba(160,100,50,0.15),inset 0 0 18px rgba(255,255,255,0.08);position:relative;z-index:2}
.breath-orb.inhale{transition:transform var(--inhale-t) ease-in-out,box-shadow var(--inhale-t) ease-in-out!important;transform:scale(1.5);box-shadow:0 0 48px rgba(200,150,90,0.5),0 0 96px rgba(160,110,60,0.25),inset 0 0 28px rgba(255,255,255,0.12)}
.breath-orb.hold{transform:scale(1.5);box-shadow:0 0 48px rgba(200,150,90,0.5),0 0 96px rgba(160,110,60,0.25)}
.breath-orb.exhale{transition:transform var(--exhale-t) ease-in-out,box-shadow var(--exhale-t) ease-in-out!important;transform:scale(1);box-shadow:0 0 28px rgba(200,140,80,0.35),0 0 56px rgba(160,100,50,0.15)}
.breath-text{font-family:'ZCOOL XiaoWei',serif;font-size:1.4rem;color:rgba(200,180,150,0.8);letter-spacing:0.3em;text-shadow:0 0 18px rgba(180,140,100,0.4);text-align:center}
.breath-counter{font-size:0.7rem;color:var(--text-dim);letter-spacing:0.15em}
.breath-info{text-align:center;color:var(--text-dim);font-size:0.65rem;letter-spacing:0.1em;line-height:2}
.breath-start-btn{background:rgba(180,140,100,0.08);border:1px solid rgba(200,150,100,0.2);border-radius:22px;padding:11px 32px;color:rgba(200,180,150,0.8);font-size:0.8rem;font-family:'Noto Serif SC',serif;letter-spacing:0.2em;cursor:pointer;transition:all 0.3s ease}
.breath-start-btn:active{background:rgba(180,140,100,0.15);transform:scale(0.97)}

/* 不开心点这 */
.letter-page{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:22px;padding:0 28px;width:100%;min-height:100%}
.letter-envelope{width:min(54vw,190px);cursor:pointer;position:relative;transition:transform 0.3s ease}
.letter-envelope:active{transform:scale(0.97)}
.envelope-svg{width:100%;height:auto;display:block}
.letter-card{background:rgba(20,14,10,0.8);border:1px solid rgba(180,150,120,0.1);border-radius:14px;padding:22px 18px;width:100%;max-width:300px;backdrop-filter:blur(12px);text-align:center;position:relative}
.letter-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(200,150,80,0.2),transparent)}
.letter-from{font-size:0.6rem;color:var(--gold-dim);letter-spacing:0.2em;margin-bottom:12px}
.letter-text{font-family:'Ma Shan Zheng',cursive;font-size:1.05rem;color:var(--text);line-height:2;letter-spacing:0.06em;min-height:50px;display:flex;align-items:center;justify-content:center}
.letter-next{margin-top:12px;font-size:0.6rem;color:var(--text-dim);letter-spacing:0.12em;opacity:0.4;cursor:pointer}
.letter-hint{font-size:0.65rem;color:var(--text-dim);letter-spacing:0.1em;opacity:0.35}
.poem-card{background:rgba(20,14,10,0.7);border:1px solid rgba(180,150,120,0.07);border-radius:14px;padding:18px 20px;width:100%;max-width:300px;backdrop-filter:blur(10px);text-align:center}
.poem-title{font-family:'ZCOOL XiaoWei',serif;font-size:0.75rem;color:var(--gold-dim);letter-spacing:0.2em;margin-bottom:14px}
.poem-text{font-family:'Ma Shan Zheng',cursive;font-size:0.95rem;color:var(--text);line-height:2.2;letter-spacing:0.05em;min-height:60px;display:flex;align-items:center;justify-content:center;text-align:center;white-space:pre-line}
.poem-next{margin-top:8px;font-size:0.58rem;color:var(--text-dim);letter-spacing:0.1em;opacity:0.3;cursor:pointer}
@keyframes envelopeOpen{0%{transform:scale(1) rotate(0deg)}30%{transform:scale(1.04) rotate(-2deg)}60%{transform:scale(0.96)}100%{transform:scale(1) translateY(-10px);opacity:0}}
.envelope-opening{animation:envelopeOpen 0.5s ease forwards}

/* 许愿 */
.wish-page{display:flex;flex-direction:column;align-items:center;gap:24px;padding:16px 28px 0;width:100%}
.wish-title{font-family:'ZCOOL XiaoWei',serif;font-size:0.9rem;color:var(--text-dim);letter-spacing:0.25em}
.wish-sky{width:100%;max-width:320px;height:160px;position:relative;border-radius:14px;background:radial-gradient(ellipse at 50% 0%,#1a2535 0%,#0f1218 100%);border:1px solid rgba(180,150,120,0.06);overflow:hidden;cursor:pointer}
.wish-star{position:absolute;border-radius:50%;cursor:pointer;transition:transform 0.3s;display:flex;align-items:center;justify-content:center}
.wish-star:active{transform:scale(1.3)}
.wish-star-inner{width:8px;height:8px;border-radius:50%;background:radial-gradient(circle,#fff 0%,rgba(220,200,180,0.8) 50%,rgba(180,140,100,0) 100%);box-shadow:0 0 6px 2px rgba(200,180,140,0.3);transition:all 0.4s ease}
.wish-star.lit .wish-star-inner{width:12px;height:12px;background:radial-gradient(circle,#fffacc 0%,rgba(220,190,100,0.9) 40%,rgba(200,160,60,0) 100%);box-shadow:0 0 12px 4px rgba(220,190,80,0.4),0 0 22px 8px rgba(200,160,50,0.15)}
.wish-input-area{width:100%;max-width:320px;position:relative}
.wish-input{width:100%;background:rgba(255,255,255,0.02);border:1px solid rgba(180,150,120,0.1);border-radius:10px;padding:10px 44px 10px 14px;color:var(--text);font-family:'Noto Serif SC',serif;font-size:0.8rem;letter-spacing:0.04em;outline:none;transition:border-color 0.3s;resize:none;height:44px}
.wish-input:focus{border-color:rgba(200,150,80,0.25)}
.wish-input::placeholder{color:var(--text-dim);opacity:0.4}
.wish-send{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;font-size:1rem;cursor:pointer;padding:4px;opacity:0.45;transition:opacity 0.3s,transform 0.3s;color:var(--gold-dim)}
.wish-send:active{opacity:1;transform:translateY(-50%) scale(1.15)}
.wish-list{width:100%;max-width:320px;display:flex;flex-direction:column;gap:6px;max-height:120px;overflow-y:auto;scrollbar-width:none}
.wish-list::-webkit-scrollbar{display:none}
.wish-item{background:rgba(255,255,255,0.02);border:1px solid rgba(180,150,120,0.04);border-radius:8px;padding:7px 12px;font-size:0.7rem;color:var(--text-dim);letter-spacing:0.04em;display:flex;align-items:center;gap:6px;animation:wishIn 0.4s ease}
@keyframes wishIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
.wish-item .wish-dot{width:4px;height:4px;border-radius:50%;background:rgba(200,150,80,0.4);flex-shrink:0}

@media(max-width:360px){.cat-scene{width:min(68vw,230px);height:min(46vw,165px)}}
</style>
</head>
<body>

<div class="bg-layer">
  <div class="bg-wall"></div><div class="bg-floor"></div>
  <div class="bg-window">
    <div class="bg-glass">
      <div class="bg-sun"></div>
      <div class="bg-cloud c1"></div><div class="bg-cloud c2"></div><div class="bg-cloud c3"></div>
      <div class="bg-moon"></div>
      <div class="bg-wstar"></div><div class="bg-wstar"></div><div class="bg-wstar"></div>
      <div class="bg-wstar"></div><div class="bg-wstar"></div><div class="bg-wstar"></div>
    </div>
  </div>
</div>

<div id="soothe-veil"></div><div id="soothe-stars"></div>
<div id="soothe-tip">轻触唤醒 · 长按退出安抚</div>

<div class="app"><div class="pages">

<!-- PAGE 1: 陪着你 -->
<div class="page active" id="page-cat">
  <div class="cat-scene" id="catScene">
    <svg class="cat-svg" viewBox="0 0 280 200" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <radialGradient id="furG" cx="42%" cy="35%" r="60%">
          <stop offset="0%" stop-color="#9bb0c2"/>
          <stop offset="45%" stop-color="#7d94a8"/>
          <stop offset="100%" stop-color="#5a7082"/>
        </radialGradient>
        <radialGradient id="bellyG" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="#f0ebe4"/>
          <stop offset="60%" stop-color="#e5ddd4"/>
          <stop offset="100%" stop-color="#d5ccc2"/>
        </radialGradient>
        <radialGradient id="cushionG" cx="50%" cy="30%" r="60%">
          <stop offset="0%" stop-color="#d4c0a8"/>
          <stop offset="50%" stop-color="#b89878"/>
          <stop offset="100%" stop-color="#8a6a50"/>
        </radialGradient>
        <radialGradient id="cushionInner" cx="50%" cy="40%" r="50%">
          <stop offset="0%" stop-color="#f0e4d4"/>
          <stop offset="100%" stop-color="#d4c0a8"/>
        </radialGradient>
        <filter id="softShadow">
          <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
        </filter>
      </defs>

      <!-- 猫窝垫子 -->
      <ellipse cx="145" cy="180" rx="115" ry="30" fill="rgba(60,30,15,0.4)"/>
      <ellipse cx="145" cy="176" rx="110" ry="26" fill="url(#cushionG)"/>
      <ellipse cx="145" cy="173" rx="95" ry="18" fill="url(#cushionInner)"/>

      <!-- 猫整体动画组 -->
      <g class="cat-anim" filter="url(#softShadow)">

        <!-- 尾巴 - 从身体右侧弯出 -->
        <path d="M 195,150 Q 230,140 240,118 Q 248,98 235,85 Q 222,72 210,80"
              stroke="#6e8698" stroke-width="16" fill="none" stroke-linecap="round"/>
        <path d="M 195,150 Q 230,140 240,118 Q 248,98 235,85 Q 222,72 210,80"
              stroke="#8a9eb0" stroke-width="8" fill="none" stroke-linecap="round" opacity="0.5"/>

        <!-- 身体 -->
        <path d="M 100,110
                 C 75,100 55,120 55,145
                 C 55,168 78,182 120,182
                 C 170,182 210,172 225,150
                 C 238,128 225,108 200,102
                 C 170,94 130,95 100,110 Z"
              fill="url(#furG)"/>

        <!-- 肚皮毛 -->
        <path d="M 70,138
                 C 65,148 68,168 90,176
                 C 118,186 155,185 185,170
                 C 200,162 210,148 208,138
                 C 200,152 175,164 140,165
                 C 100,166 75,155 70,138 Z"
              fill="url(#bellyG)" opacity="0.8"/>

        <!-- 后腿 / 蜷缩的脚 -->
        <ellipse cx="195" cy="165" rx="22" ry="15" fill="url(#furG)" transform="rotate(-10,195,165)"/>
        <ellipse cx="200" cy="170" rx="12" ry="7" fill="#e8ddd4" opacity="0.5"/>

        <!-- 头 -->
        <circle cx="88" cy="95" r="42" fill="url(#furG)"/>

        <!-- 脸下半浅色 -->
        <ellipse cx="92" cy="108" rx="28" ry="20" fill="url(#bellyG)" opacity="0.65"/>

        <!-- 耳朵 -->
        <g>
          <!-- 左耳 -->
          <ellipse cx="54" cy="55" rx="15" ry="22" fill="url(#furG)" transform="rotate(-14,54,55)"/>
          <ellipse cx="56" cy="57" rx="9" ry="14" fill="#e8c4c0" transform="rotate(-14,56,57)"/>
          <!-- 右耳 -->
          <ellipse cx="118" cy="55" rx="15" ry="22" fill="url(#furG)" transform="rotate(14,118,55)"/>
          <ellipse cx="116" cy="57" rx="9" ry="14" fill="#e8c4c0" transform="rotate(14,116,57)"/>
        </g>

        <!-- 眼睛 - 睁开（白天） -->
        <g class="eyes-open">
          <!-- 左眼 -->
          <ellipse cx="75" cy="88" rx="10" ry="11" fill="#1a1510"/>
          <circle cx="76" cy="89" r="7" fill="#b8c898"/>
          <ellipse cx="76" cy="89" rx="3.5" ry="5.5" fill="#0a0805"/>
          <circle cx="73" cy="86" r="2.8" fill="#fff"/>
          <circle cx="78" cy="91" r="1.3" fill="#fff" opacity="0.6"/>
          <!-- 右眼 -->
          <ellipse cx="103" cy="88" rx="10" ry="11" fill="#1a1510"/>
          <circle cx="104" cy="89" r="7" fill="#b8c898"/>
          <ellipse cx="104" cy="89" rx="3.5" ry="5.5" fill="#0a0805"/>
          <circle cx="101" cy="86" r="2.8" fill="#fff"/>
          <circle cx="106" cy="91" r="1.3" fill="#fff" opacity="0.6"/>
        </g>

        <!-- 眼睛 - 闭眼（安抚入睡） -->
        <g class="eyes-closed">
          <path d="M 67,88 Q 75,82 83,88" stroke="#2a2218" stroke-width="2.5" fill="none" stroke-linecap="round"/>
          <path d="M 95,88 Q 103,82 111,88" stroke="#2a2218" stroke-width="2.5" fill="none" stroke-linecap="round"/>
        </g>

        <!-- 鼻子 -->
        <ellipse cx="89" cy="102" rx="5" ry="3.5" fill="#e0a0a0"/>
        <!-- 鼻梁高光 -->
        <ellipse cx="88" cy="101" rx="2" ry="1.2" fill="#f0c8c8" opacity="0.5"/>

        <!-- 嘴巴 -->
        <g stroke="#b89888" stroke-width="1.4" fill="none" stroke-linecap="round">
          <path d="M 84,104 Q 78,110 72,107"/>
          <path d="M 94,104 Q 100,110 106,107"/>
        </g>

        <!-- 腮红 -->
        <ellipse cx="62" cy="98" rx="8" ry="5" fill="#e8c0b8" opacity="0.35"/>
        <ellipse cx="116" cy="98" rx="8" ry="5" fill="#e8c0b8" opacity="0.35"/>

        <!-- 胡须 -->
        <g stroke="rgba(160,145,130,0.4)" stroke-width="1" stroke-linecap="round">
          <line x1="55" y1="96" x2="22" y2="90"/><line x1="53" y1="102" x2="18" y2="102"/>
          <line x1="55" y1="108" x2="24" y2="116"/>
          <line x1="121" y1="96" x2="154" y2="90"/><line x1="123" y1="102" x2="158" y2="102"/>
          <line x1="121" y1="108" x2="152" y2="116"/>
        </g>

        <!-- 前爪 -->
        <ellipse cx="85" cy="175" rx="14" ry="9" fill="url(#furG)"/>
        <ellipse cx="87" cy="178" rx="6" ry="4" fill="#e8ddd4" opacity="0.45"/>

        <!-- 项圈 -->
        <path d="M 68,120 Q 88,130 108,120" stroke="#c47850" stroke-width="3" fill="none" opacity="0.7" stroke-linecap="round"/>
        <circle cx="88" cy="126" r="4" fill="#d4a860" opacity="0.7"/>
      </g>
    </svg>

    <div class="blanket" id="blanket"></div>
  </div>

  <div class="msg-area"><div class="msg-bubble" id="msgBubble"></div></div>
  <div class="sound-row">
    <button class="sound-btn" id="btnRain" onclick="toggleSound('rain')"><span>🌧</span>雨声</button>
    <button class="sound-btn" id="btnFire" onclick="toggleSound('fire')"><span>🔥</span>壁炉</button>
    <button class="sound-btn" id="btnNight" onclick="toggleSound('night')"><span>🌙</span>虫鸣</button>
    <button class="sound-btn" id="btnPurr" onclick="togglePurrSound()"><span>🐱</span>呼噜</button>
  </div>
</div>

<!-- PAGE 2 -->
<div class="page" id="page-breath">
  <div class="breath-page">
    <div class="breath-orb-wrap"><div class="orb-ring"></div><div class="orb-ring"></div><div class="orb-ring"></div><div class="breath-orb" id="breathOrb"></div></div>
    <div class="breath-text" id="breathText">准备好了吗</div><div class="breath-counter" id="breathCounter"></div>
    <div class="breath-info">吸气 4秒 · 屏息 7秒 · 呼气 8秒<br><span style="opacity:0.4;font-size:0.6rem">跟着光球的节奏</span></div>
    <button class="breath-start-btn" id="breathBtn" onclick="toggleBreath()">开始</button>
  </div>
</div>

<!-- PAGE 3 -->
<div class="page" id="page-letter">
  <div class="letter-page">
    <div style="text-align:center"><div style="font-family:'ZCOOL XiaoWei',serif;font-size:0.75rem;color:var(--text-dim);letter-spacing:0.25em;margin-bottom:4px">不开心？点这里</div><div style="font-size:0.6rem;color:var(--text-dim);opacity:0.3;letter-spacing:0.1em">有人一直在陪着你</div></div>
    <div class="letter-envelope" id="envelope" onclick="openCheer()">
      <svg class="envelope-svg" viewBox="0 0 260 180"><defs><linearGradient id="envG" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#2a1f18"/><stop offset="100%" stop-color="#1c1410"/></linearGradient><linearGradient id="flapG" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#352820"/><stop offset="100%" stop-color="#231810"/></linearGradient></defs><rect x="10" y="40" width="240" height="130" rx="8" fill="url(#envG)" stroke="rgba(180,150,120,0.1)" stroke-width="1"/><path d="M10 40L130 110L10 170" fill="none" stroke="rgba(180,150,120,0.04)" stroke-width="1"/><path d="M250 40L130 110L250 170" fill="none" stroke="rgba(180,150,120,0.04)" stroke-width="1"/><path d="M10 40Q130 10 250 40L130 110Z" fill="url(#flapG)" stroke="rgba(180,150,120,0.1)" stroke-width="1"/><circle cx="130" cy="108" r="11" fill="#c49060" opacity="0.65"/><circle cx="130" cy="108" r="7" fill="#d4a070" opacity="0.45"/><rect x="10" y="40" width="240" height="130" rx="8" fill="none" stroke="rgba(200,150,80,0.1)" stroke-width="1.5"/></svg>
    </div>
    <div class="letter-card" id="letterCard" style="display:none"><div class="letter-from">✦ 给你 ✦</div><div class="letter-text" id="letterText"></div><div class="letter-next" onclick="nextCheer()">轻触换一句 ↓</div></div>
    <div class="letter-hint" id="letterHint">每次打开都有不同的话</div>
    <div class="poem-card"><div class="poem-title">✦ 加油小诗 ✦</div><div class="poem-text" id="poemText"></div><div class="poem-next" onclick="nextPoem()">换一首 →</div></div>
  </div>
</div>

<!-- PAGE 4 -->
<div class="page" id="page-wish">
  <div class="wish-page">
    <div class="wish-title">✦ 许个愿吧 ✦</div>
    <div class="wish-sky" id="wishSky" onclick="addRandomStar(event)"></div>
    <div class="wish-input-area"><input class="wish-input" id="wishInput" placeholder="写下此刻想说的话…" maxlength="40"/><button class="wish-send" onclick="submitWish()">✦</button></div>
    <div class="wish-list" id="wishList"></div>
  </div>
</div>

</div>
<div class="tabbar">
  <div class="tab active" data-page="cat" onclick="switchTab('cat',this)"><div class="tab-icon">🐱</div><div class="tab-label">陪着你</div></div>
  <div class="tab" data-page="breath" onclick="switchTab('breath',this)"><div class="tab-icon">🌬</div><div class="tab-label">呼吸</div></div>
  <div class="tab" data-page="letter" onclick="switchTab('letter',this)"><div class="tab-icon">💛</div><div class="tab-label">不开心点这</div></div>
  <div class="tab" data-page="wish" onclick="switchTab('wish',this)"><div class="tab-icon">✨</div><div class="tab-label">许愿</div></div>
</div>
</div>

<script>
// === 消息 ===
const catMsgs=["夜深了，不用一个人扛着所有事","睡不着也没关系，我陪着你","今天辛苦了，慢慢呼吸就好","你已经很努力了，可以休息了","不用想太多，先闭上眼睛","明天的事明天再说，此刻只是休息","有我陪着，不怕的","温柔地待自己，就像待我一样","黑夜也会过去的","今天辛苦啦","我陪你睡","别想太多啦","欢迎回家~"];
const lateMsgs=["怎么还没睡呀","又在偷偷熬夜吗","快睡吧，很晚啦","你是不是又失眠了","我陪你数星星吧","熬夜对身体不好哦"];
const comfortMsgs=["安静……它睡着了","跟着它一起呼吸","闭上眼睛……","不用想任何事……","晚安~","一起睡吧~","做个好梦~","我陪着你呢~"];
const petMsgs=["好舒服~","再摸摸我嘛~","蹭蹭~","好温暖~","呼噜呼噜~","最喜欢你了~"];
let msgIdx=0,msgTimer;const msgBubble=document.getElementById('msgBubble');
function isLate(){return new Date().getHours()>=1&&new Date().getHours()<5}
function showMsg(t,d=4500){msgBubble.textContent=t;msgBubble.classList.add('show');clearTimeout(msgTimer);msgTimer=setTimeout(()=>msgBubble.classList.remove('show'),d)}
function pick(a){return a[Math.floor(Math.random()*a.length)]}

// === 音频 ===
let audioCtx=null;const ss={rain:false,fire:false,night:false,purr:false},gn={},sn={};
let po=null,pg=null,pf=null,pr=null,pactive=false;
function ia(){if(audioCtx)return;audioCtx=new(window.AudioContext||window.webkitAudioContext)()}
function mkNoise(t){
  const l=audioCtx.sampleRate*4,b=audioCtx.createBuffer(1,l,audioCtx.sampleRate),d=b.getChannelData(0);
  for(let i=0;i<l;i++)d[i]=Math.random()*2-1;
  const s=audioCtx.createBufferSource();s.buffer=b;s.loop=true;const g=audioCtx.createGain();g.gain.value=0;
  if(t==='rain'){const hp=audioCtx.createBiquadFilter();hp.type='highpass';hp.frequency.value=300;const bp=audioCtx.createBiquadFilter();bp.type='bandpass';bp.frequency.value=1200;bp.Q.value=0.35;s.connect(hp);hp.connect(bp);bp.connect(g)}
  else if(t==='fire'){const lp=audioCtx.createBiquadFilter();lp.type='lowpass';lp.frequency.value=400;const lp2=audioCtx.createBiquadFilter();lp2.type='lowpass';lp2.frequency.value=200;s.connect(lp);lp.connect(lp2);lp2.connect(g)}
  else{const bp=audioCtx.createBiquadFilter();bp.type='bandpass';bp.frequency.value=800;bp.Q.value=0.8;const hp=audioCtx.createBiquadFilter();hp.type='highpass';hp.frequency.value=600;s.connect(bp);bp.connect(hp);hp.connect(g)}
  g.connect(audioCtx.destination);s.start();return{g,s};
}
function sg(t,v,tt=1.2){if(!gn[t])return;gn[t].gain.cancelScheduledValues(audioCtx.currentTime);gn[t].gain.linearRampToValueAtTime(v,audioCtx.currentTime+tt)}
function toggleSound(t){ia();ss[t]=!ss[t];document.getElementById('btn'+t[0].toUpperCase()+t.slice(1)).classList.toggle('active',ss[t]);if(ss[t]){if(!gn[t]){const{g,s}=mkNoise(t);gn[t]=g;sn[t]=s}sg(t,t==='rain'?0.3:t==='fire'?0.25:0.18)}else sg(t,0)}
function togglePurrSound(){ia();ss.purr=!ss.purr;document.getElementById('btnPurr').classList.toggle('active',ss.purr);ss.purr?sp():stp()}
function sp(){if(!audioCtx||pactive)return;pactive=true;po=audioCtx.createOscillator();po.type='sine';po.frequency.value=55;pf=audioCtx.createBiquadFilter();pf.type='lowpass';pf.frequency.value=200;pf.Q.value=2;pg=audioCtx.createGain();pg.gain.value=0;po.connect(pf);pf.connect(pg);pg.connect(audioCtx.destination);po.start();pg.gain.linearRampToValueAtTime(0.05,audioCtx.currentTime+0.3);pr=setInterval(()=>{if(!pactive||!audioCtx)return;const t=audioCtx.currentTime;pg.gain.setValueAtTime(0.05,t);pg.gain.linearRampToValueAtTime(0.012,t+0.1);pg.gain.linearRampToValueAtTime(0.05,t+0.24)},155)}
function stp(){if(!pactive)return;pactive=false;clearInterval(pr);pr=null;if(audioCtx&&pg)pg.gain.linearRampToValueAtTime(0,audioCtx.currentTime+0.3);setTimeout(()=>{try{if(po){po.stop();po.disconnect();po=null}if(pf){pf.disconnect();pf=null}if(pg){pg.disconnect();pg=null}}catch(e){}},500)}

// === 星星 ===
(function(){const c=document.getElementById('soothe-stars');for(let i=0;i<45;i++){const s=document.createElement('div');s.className='soothe-star';s.style.left=Math.random()*100+'%';s.style.top=Math.random()*100+'%';const sz=2+Math.random()*3;s.style.width=sz+'px';s.style.height=sz+'px';s.style.setProperty('--sdur',(3+Math.random()*5)+'s');s.style.setProperty('--sdelay',Math.random()*6+'s');c.appendChild(s)}})();

// === 猫互动 ===
const catScene=document.getElementById('catScene');
let isSoothe=false,isPressing=false,holdTimer=null,holdStart=0,lpt=0,pc=0;
function spawnPurr(x,y){const ts=['呼噜~','咕噜…','喵~','zzz','♡'];const el=document.createElement('div');el.className='purr';el.textContent=ts[Math.floor(Math.random()*ts.length)];el.style.cssText=`left:${x+(Math.random()*40-20)}px;top:${y}px`;document.body.appendChild(el);setTimeout(()=>el.remove(),2400)}
function spawnHeart(x,y){const hs=['💕','💗','💖','✨','💝','🩷'];const el=document.createElement('div');el.className='heart-puff';el.textContent=hs[Math.floor(Math.random()*hs.length)];el.style.left=x+'px';el.style.top=y+'px';el.style.fontSize=(14+Math.random()*16)+'px';document.body.appendChild(el);el.addEventListener('animationend',()=>el.remove())}

catScene.addEventListener('click',e=>{
  if(Date.now()-holdStart>400)return;
  const r=catScene.getBoundingClientRect();spawnPurr(r.left+r.width/2,r.top+26);
  if(!ss.purr){stp();setTimeout(sp,50);setTimeout(stp,2200)}
  showMsg(isSoothe?pick(comfortMsgs):isLate()&&Math.random()>0.4?pick(lateMsgs):catMsgs[msgIdx++%catMsgs.length],4500);
});
catScene.addEventListener('pointerdown',e=>{isPressing=true;holdStart=Date.now();holdTimer=setTimeout(()=>{if(isPressing)ts()},1000)});
catScene.addEventListener('pointerup',()=>{isPressing=false;clearTimeout(holdTimer)});
catScene.addEventListener('pointerleave',()=>{isPressing=false;clearTimeout(holdTimer)});
catScene.addEventListener('pointermove',e=>{if(!isPressing||isSoothe)return;if(Date.now()-lpt>160){spawnHeart(e.clientX,e.clientY);lpt=Date.now();pc++;if(pc%7===0)showMsg(pick(petMsgs),2800)}});

function ts(){isSoothe=!isSoothe;isPressing=false;clearTimeout(holdTimer);document.body.classList.toggle('soothe',isSoothe);document.getElementById('soothe-stars').classList.toggle('active',isSoothe);if(isSoothe){showMsg(pick(comfortMsgs),4000);window._sti=setInterval(()=>{showMsg(pick(isLate()?lateMsgs:comfortMsgs),4000)},8000)}else{clearInterval(window._sti);showMsg(pick(catMsgs),4000)}}

// === 呼吸 ===
const orb=document.getElementById('breathOrb'),bt=document.getElementById('breathText'),bc=document.getElementById('breathCounter'),bb=document.getElementById('breathBtn');
let br=false,bto=null;
const phs=[{name:'吸气',dur:4000,cls:'inhale'},{name:'屏息',dur:7000,cls:'hold'},{name:'呼气',dur:8000,cls:'exhale'}];
function rb(i){if(!br)return;const p=phs[i%3];orb.className='breath-orb';orb.style.setProperty('--inhale-t',p.dur+'ms');orb.style.setProperty('--exhale-t',p.dur+'ms');void orb.offsetWidth;orb.classList.add(p.cls);bt.textContent=p.name;let s=Math.ceil(p.dur/1000);bc.textContent=s+' 秒';const ct=setInterval(()=>{s--;bc.textContent=s>0?s+' 秒':''},1000);bto=setTimeout(()=>{clearInterval(ct);rb(i+1)},p.dur)}
function toggleBreath(){br=!br;if(br){bb.textContent='停止';rb(0)}else{clearTimeout(bto);bb.textContent='开始';bt.textContent='准备好了吗';bc.textContent='';orb.className='breath-orb'}}

// === 不开心点这 ===
const cheerMsgs=["没关系的，难过也是可以的","你已经很棒了，不需要和别人比","累了就停下来，休息不是偷懒","今天的不开心就到今天为止","被爱的人不用太懂事","允许自己脆弱，那也是勇气","不用总是假装坚强，这里很安全","你知道的，我一直都在","好好吃饭，好好睡觉，你最珍贵","你不是一个人，永远不会是"];
const poems=["别急，慢慢来。\n你已经做得够好了。","累了就歇一歇，\n天不会塌，\n你的快乐最重要。","别怕，往前走。\n月亮会照着你，\n我也会。","你值得最好的，\n别总是委屈自己。","你已经很努力啦，\n今天也辛苦你了。","有些路要慢慢走，\n有些眼泪不必忍。","日子还长，\n不必慌张，\n好事总在下一站。","世界偶尔吵，\n你偶尔累，\n这都很正常。"];
let ci=Math.floor(Math.random()*cheerMsgs.length),pi=Math.floor(Math.random()*poems.length),co=false;
document.getElementById('poemText').textContent=poems[pi];
function openCheer(){if(co)return;co=true;const env=document.getElementById('envelope');env.classList.add('envelope-opening');setTimeout(()=>{env.style.display='none';const card=document.getElementById('letterCard');card.style.display='block';document.getElementById('letterText').textContent=cheerMsgs[ci];document.getElementById('letterHint').style.display='none';card.style.opacity='0';card.style.transform='translateY(10px)';card.style.transition='opacity 0.5s ease,transform 0.5s ease';setTimeout(()=>{card.style.opacity='1';card.style.transform='translateY(0)'},50)},500)}
function nextCheer(){ci=(ci+1)%cheerMsgs.length;const lt=document.getElementById('letterText');lt.style.opacity='0';setTimeout(()=>{lt.textContent=cheerMsgs[ci];lt.style.transition='opacity 0.4s ease';lt.style.opacity='1'},200)}
function nextPoem(){pi=(pi+1)%poems.length;const pt=document.getElementById('poemText');pt.style.opacity='0';setTimeout(()=>{pt.textContent=poems[pi];pt.style.transition='opacity 0.4s ease';pt.style.opacity='1'},200)}

// === 许愿 ===
const ws=document.getElementById('wishSky'),wi=document.getElementById('wishInput'),wl=document.getElementById('wishList');
let wishes=[];try{wishes=JSON.parse(localStorage.getItem('cat-wishes')||'[]')}catch(e){}
for(let i=0;i<30;i++)as(Math.random()*100,Math.random()*100,false);
try{JSON.parse(localStorage.getItem('cat-stars')||'[]').forEach(([x,y])=>as(x,y,true))}catch(e){}
wishes.forEach(w=>rw(w));
function addRandomStar(e){const r=ws.getBoundingClientRect();as((e.clientX-r.left)/r.width*100,(e.clientY-r.top)/r.height*100,true);svs()}
function as(x,y,lit){const s=document.createElement('div');s.className='wish-star'+(lit?' lit':'');s.style.cssText=`left:${x}%;top:${y}%;width:20px;height:20px;transform:translate(-50%,-50%)`;const i=document.createElement('div');i.className='wish-star-inner';s.appendChild(i);s.onclick=e=>{e.stopPropagation();s.classList.toggle('lit');svs()};ws.appendChild(s)}
function svs(){const st=[...ws.querySelectorAll('.wish-star.lit')].map(s=>[parseFloat(s.style.left),parseFloat(s.style.top)]);try{localStorage.setItem('cat-stars',JSON.stringify(st))}catch(e){}}
function submitWish(){const t=wi.value.trim();if(!t)return;wishes.unshift(t);if(wishes.length>20)wishes.pop();try{localStorage.setItem('cat-wishes',JSON.stringify(wishes))}catch(e){}rw(t,true);wi.value=''}
function rw(text,prepend){const item=document.createElement('div');item.className='wish-item';item.innerHTML=`<div class="wish-dot"></div><span>${text}</span>`;if(prepend)wl.prepend(item);else wl.appendChild(item)}
wi.addEventListener('keydown',e=>{if(e.key==='Enter')submitWish()});
function switchTab(name,el){document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));document.getElementById('page-'+name).classList.add('active');el.classList.add('active')}

setInterval(()=>{if(isSoothe||msgBubble.classList.contains('show'))return;if(isLate()&&Math.random()>0.35)showMsg(pick(lateMsgs),4000);else if(Math.random()>0.6)showMsg(catMsgs[msgIdx++%catMsgs.length],4000)},22000);
</script>
</body>
</html>
